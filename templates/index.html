<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fiyat Takip Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        th {
            color: var(--accent-blue);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }
        td {
            color: var(--text-main);
            font-size: 0.95rem;
        }
        .status-badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-blue);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Destekli Fiyat Takip Sistemi</h1>
        <p class="subtitle">Ürün fiyat deđiţimleri ve yapay zeka duyarlýlýk analiz paneli.</p>
        
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Ürün Adý</th>
                        <th>Platform</th>
                        <th>Mevcut Fiyat</th>
                        <th>Yapay Zeka Analizi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Akýllý Telefon X</td>
                        <td>E-Ticaret A</td>
                        <td>24.999 TL</td>
                        <td><span class="status-badge">Fiyat Kararlý</span></td>
                    </tr>
                    <tr>
                        <td>Kablosuz Kulaklýk Y</td>
                        <td>E-Ticaret B</td>
                        <td>3.499 TL</td>
                        <td><span class="status-badge" style="color: #f43f5e; background: rgba(244, 63, 94, 0.1);">Düţüţ Eđilimi %12</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
